<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard | PlasticBlocks3D</title>

<link rel="stylesheet" href="../css/style.css">

<link rel="icon" href="../images/logos/logo.png">

</head>


<body>


<header class="nav">


<div class="brand">


<a href="../index.html" class="logo-link">

<img 
src="../images/logos/logo.png"
alt="PlasticBlocks3D Logo">

</a>



<div>

<h2>
PlasticBlocks3D
</h2>


<p>
Admin Dashboard
</p>


</div>


</div>





<div>


<button
id="refreshButton"
class="secondary">
Refresh
</button>

<a href="analytics.html" class="button secondary">
    📈 Analytics
</a>

<button
id="logoutButton"
class="primary">
Logout
</button>


</div>



</header>






<section class="page-header">


<h1>
Project Management
</h1>


<p>
Manage customer requests and website activity.
</p>


</section>







<main class="admin-page">





<!-- =======================
STATUS CARDS
======================= -->


<section class="dashboard-stats">



<div 
class="stat-card filter-card"
data-status="New">


<h2 id="newCount">
0
</h2>


<p>
New
</p>


</div>






<div 
class="stat-card filter-card"
data-status="Reviewing">


<h2 id="reviewCount">
0
</h2>


<p>
Reviewing
</p>


</div>






<div 
class="stat-card filter-card"
data-status="Designing">


<h2 id="designCount">
0
</h2>


<p>
Designing
</p>


</div>






<div 
class="stat-card filter-card"
data-status="Printing">


<h2 id="printingCount">
0
</h2>


<p>
Printing
</p>


</div>






<div 
class="stat-card filter-card"
data-status="Quality Check">


<h2 id="qualityCount">
0
</h2>


<p>
Quality Check
</p>


</div>






<div 
class="stat-card filter-card"
data-status="Completed">


<h2 id="completeCount">
0
</h2>


<p>
Completed
</p>


</div>






<div 
class="stat-card filter-card"
data-status="Archived">


<h2 id="archiveCount">
0
</h2>


<p>
Archived
</p>


</div>




</section>

<!-- =======================
SEARCH
======================= -->


<section class="admin-toolbar">



<input

id="searchQuotes"

type="text"

placeholder="Search customer or project..."

>





<select id="statusFilter">


<option value="all">
All Requests
</option>



<option value="New">
New
</option>



<option value="Reviewing">
Reviewing
</option>



<option value="Designing">
Designing
</option>



<option value="Printing">
Printing
</option>



<option value="Quality Check">
Quality Check
</option>



<option value="Completed">
Completed
</option>



<option value="Archived">
Archived
</option>



</select>



</section>









<!-- =======================
REQUEST AREA
======================= -->


<section class="admin-layout">





<div class="request-column">


<h2>
Requests
</h2>



<div id="quotes">

Loading...

</div>


</div>







<div class="details-column">


<h2>
Project Details
</h2>



<div 
id="detailsPanel"
class="details-panel">


<p>
Select a request.
</p>


</div>



</div>




</section>






</main>









<!-- SCRIPTS -->


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="../js/supabase.js"></script>

<script src="../js/auth.js"></script>

<script src="../js/admin.js"></script>



</body>


</html>
