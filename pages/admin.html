<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard | PlasticBlocks3D</title>

<link rel="stylesheet" href="../css/style.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">

</head>


<body>


<header class="nav">


<div class="brand">

<a href="../index.html" class="logo-link">

<img src="../images/logos/logo.png" alt="PlasticBlocks3D Logo">

</a>


<div>

<h2>
PlasticBlocks3D
</h2>

<p>
Admin Dashboard
</p>

</div>

</div>



<button id="logoutButton" class="primary">

Logout

</button>


</header>





<section class="page-header">

<div class="container">

<p class="section-label">
PROJECT MANAGEMENT
</p>


<h1>
Quote Dashboard
</h1>


<p class="intro-text">

Manage customer projects, files, and progress.

</p>


</div>

</section>






<section class="page-content">


<div class="container">



<div class="dashboard-stats">


<div class="stat-card">
<h2 id="newCount">0</h2>
<p>New</p>
</div>


<div class="stat-card">
<h2 id="reviewCount">0</h2>
<p>Reviewing</p>
</div>


<div class="stat-card">
<h2 id="quoteCount">0</h2>
<p>Quoted</p>
</div>


<div class="stat-card">
<h2 id="printingCount">0</h2>
<p>Printing</p>
</div>


<div class="stat-card">
<h2 id="completeCount">0</h2>
<p>Completed</p>
</div>


<div class="stat-card">
<h2 id="archiveCount">0</h2>
<p>Archived</p>
</div>


</div>





<div class="admin-tools">


<input
id="searchQuotes"
type="text"
placeholder="Search projects, customers, emails..."
>


<select id="statusFilter">


<option value="all">
All Requests
</option>


<option value="New">
New
</option>


<option value="Reviewing">
Reviewing
</option>


<option value="Quoted">
Quoted
</option>


<option value="Approved">
Approved
</option>


<option value="Printing">
Printing
</option>


<option value="Completed">
Completed
</option>


<option value="Archived">
Archived
</option>


</select>


</div>





<div id="quotes" class="quote-grid">

Loading projects...

</div>





<div id="detailsPanel">

</div>



</div>


</section>





<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="../js/supabase.js"></script>

<script src="../js/admin.js"></script>


</body>

</html>
